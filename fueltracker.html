<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GarageX — Fuel Tracker</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="fuel">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon">🚗</div>
          <div class="brand-name">GarageX</div>
        </div>
        <nav class="sidebar-nav">
          <a class="nav-link" href="index.html"><span class="nav-icon">▦</span> Dashboard</a>
          <a class="nav-link" href="index.html#garage"><span class="nav-icon">🏠</span> Garage</a>
          <a class="nav-link active" href="fueltracker.html"><span class="nav-icon">⛽</span> Fuel Tracker</a>
          <a class="nav-link" href="servicetimeline.html"><span class="nav-icon">🔧</span> Service History</a>
          <a class="nav-link" href="index.html#expenses"><span class="nav-icon">💰</span> Expenses</a>
          <a class="nav-link" href="index.html#documents"><span class="nav-icon">📄</span> Documents</a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-card">
            <div class="user-avatar">AK</div>
            <div class="user-info">
              <strong>Apsar Khan</strong>
              <span>apsar@email.com</span>
            </div>
          </div>
        </div>
      </aside>

      <div class="main-area">
        <header class="topbar">
          <div class="greeting">
            <h1>Fuel Tracker</h1>
            <p>Log fill-ups — they sync with your dashboard.</p>
          </div>
        </header>

        <div class="page-content">
          <div class="card">
            <form id="fuelForm">
              <div class="form-grid">
                <div class="field">
                  <label for="date">Date</label>
                  <input type="date" id="date" name="date" required />
                </div>
                <div class="field">
                  <label for="litres">Litres</label>
                  <input type="number" id="litres" name="litres" placeholder="e.g. 45" step="0.01" min="0" required />
                </div>
                <div class="field">
                  <label for="amount">Amount (₹)</label>
                  <input type="number" id="amount" name="amount" placeholder="e.g. 3500" step="0.01" min="0" required />
                </div>
                <div class="field">
                  <label for="mileage">Mileage (km)</label>
                  <input type="number" id="mileage" name="mileage" placeholder="e.g. 12540" min="0" />
                </div>
                <div class="field full">
                  <label for="station">Fuel Station</label>
                  <input type="text" id="station" name="station" placeholder="e.g. Shell, BP" />
                </div>
              </div>
              <div class="submit-row">
                <button class="btn" type="submit">Save Fuel Entry</button>
                <a class="btn secondary" href="index.html">Back to Dashboard</a>
              </div>
              <div id="fuelToast" class="toast" role="status"></div>
            </form>
          </div>

          <div class="card" style="margin-top:18px;">
            <h2>All Fuel Entries</h2>
            <div id="fuelLog" class="list"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
