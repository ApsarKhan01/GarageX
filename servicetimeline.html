<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GarageX — Service History</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="service">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon">🚗</div>
          <div class="brand-name">GarageX</div>
        </div>
        <nav class="sidebar-nav">
          <a class="nav-link" href="index.html"><span class="nav-icon">▦</span> Dashboard</a>
          <a class="nav-link" href="index.html#garage"><span class="nav-icon">🏠</span> Garage</a>
          <a class="nav-link" href="fueltracker.html"><span class="nav-icon">⛽</span> Fuel Tracker</a>
          <a class="nav-link active" href="servicetimeline.html"><span class="nav-icon">🔧</span> Service History</a>
          <a class="nav-link" href="index.html#reminders"><span class="nav-icon">🔔</span> Reminders</a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-card">
            <div class="user-avatar">AK</div>
            <div class="user-info">
              <strong>Apsar Khan</strong>
              <span>apsar@email.com</span>
            </div>
          </div>
        </div>
      </aside>

      <div class="main-area">
        <header class="topbar">
          <div class="greeting">
            <h1>Service History</h1>
            <p>Track maintenance and mark items complete.</p>
          </div>
        </header>

        <div class="page-content wide">
          <div class="card">
            <div class="year" id="timelineYear">2026</div>
            <div id="timelineList" class="timeline"></div>

            <form id="serviceForm" style="margin-top:20px;">
              <div class="form-grid">
                <div class="field">
                  <label for="title">Service title</label>
                  <input type="text" id="title" name="title" placeholder="e.g. Oil Change" required />
                </div>
                <div class="field">
                  <label for="date">Due date</label>
                  <input type="date" id="date" name="date" required />
                </div>
                <div class="field full">
                  <label for="notes">Notes</label>
                  <input type="text" id="notes" name="notes" placeholder="optional" />
                </div>
              </div>
              <div class="submit-row">
                <button class="btn" type="submit">Add Service</button>
                <a class="btn secondary" href="index.html">Back to Dashboard</a>
              </div>
              <div id="serviceToast" class="toast" role="status"></div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
